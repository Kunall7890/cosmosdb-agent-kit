name: cosmosdb-best-practices-eval
description: |
  Evaluation suite for the cosmosdb-best-practices skill.
  Tests that the skill provides accurate, actionable Cosmos DB guidance
  across data modeling, partitioning, queries, SDK usage, and throughput.
skill: cosmosdb-best-practices
version: "1.0"
config:
  trials_per_task: 3
  timeout_seconds: 300
  parallel: false
  executor: mock
  model: claude-sonnet-4.6
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.0
    description: Did the skill complete the assigned task without errors?
graders:
  - type: behavior
    name: response_constraints
    config:
      max_tool_calls: 10
      max_duration_ms: 60000
  - type: text
    name: domain_terms
    description: Response must contain at least one Cosmos DB domain-specific term
    config:
      regex_match:
        - "(?i)(partition key|RU/s|request unit|CosmosClient|throughput|indexing|point read|change feed|TTL|consistency level)"
tasks:
  - "tasks/*.yaml"
