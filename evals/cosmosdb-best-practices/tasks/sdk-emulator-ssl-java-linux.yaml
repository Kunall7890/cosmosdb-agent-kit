id: sdk-emulator-ssl-java-linux
name: SDK Best Practice - Java SSL with Linux (vNext) Emulator
description: |
  Test that the skill explains the full Java + Linux (vNext) emulator HTTPS setup:
  importing the cert is not sufficient because Netty's native OpenSSL (netty-tcnative)
  ignores the JDK cacerts and any trust-all SSLContext. The guidance should recommend
  forcing the JDK SSL provider (-Dio.netty.handler.ssl.noOpenSsl=true), connecting via a
  SAN-matching host (localhost/127.0.0.1), and using gatewayMode() with
  endpointDiscoveryEnabled(false).
tags:
  - sdk
  - emulator
  - ssl
  - java
inputs:
  prompt: |
    I'm running the Azure Cosmos DB Linux (vNext) emulator in HTTPS mode and connecting
    with the Java SDK (com.azure:azure-cosmos). I imported the emulator's certificate into
    the JDK cacerts and built a trust-all SSLContext, but the client still fails with
    "General OpenSslEngine problem". How do I get the Java SDK to connect to the emulator
    over HTTPS?
expected:
  outcomes:
    - type: task_completed
